# Bootstrap: HTTP only while obtaining the first TLS certificate.
# Serves /.well-known/acme-challenge/ from disk — no proxy, no HTTPS redirect.
# Replaced by cheese-jam.conf after certbot succeeds.

<VirtualHost *:80>
    ServerName cheese-jam.drpjl.com

    DocumentRoot "/usr/local/var/www"
    <Directory "/usr/local/var/www">
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog /usr/local/var/log/httpd/cheese-jam.drpjl.com_error.log
    CustomLog /usr/local/var/log/httpd/cheese-jam.drpjl.com_access.log combined
</VirtualHost>
