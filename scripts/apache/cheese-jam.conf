# cheese-jam.drpjl.com → ChordFiddle (Node on localhost:9000)
# Installed to /usr/local/etc/httpd/extra/cheese-jam.conf

# --- HTTP: ACME challenge + redirect to HTTPS ---
<VirtualHost *:80>
    ServerName cheese-jam.drpjl.com

    Alias /.well-known/acme-challenge/ "/usr/local/var/www/.well-known/acme-challenge/"
    <Directory "/usr/local/var/www/.well-known/acme-challenge/">
        AllowOverride None
        Options None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

# --- HTTPS: reverse proxy to ChordFiddle ---
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName cheese-jam.drpjl.com

    Alias /.well-known/acme-challenge/ "/usr/local/var/www/.well-known/acme-challenge/"
    <Directory "/usr/local/var/www/.well-known/acme-challenge/">
        AllowOverride None
        Options None
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPass /.well-known/acme-challenge/ !
    ProxyPass / http://127.0.0.1:9000/
    ProxyPassReverse / http://127.0.0.1:9000/

    ErrorLog /usr/local/var/log/httpd/cheese-jam.drpjl.com_error.log
    CustomLog /usr/local/var/log/httpd/cheese-jam.drpjl.com_access.log combined

    SSLEngine on

    # Per-host certificate (default — run scripts/install-apache.sh to obtain)
    SSLCertificateFile /etc/letsencrypt/live/cheese-jam.drpjl.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/cheese-jam.drpjl.com/privkey.pem

    # Wildcard *.drpjl.com — uncomment these and comment the lines above instead:
    # SSLCertificateFile /etc/letsencrypt/live/drpjl.com/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/drpjl.com/privkey.pem

    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
